<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>OlaWebTools - 测试工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #fff;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }

        .header p {
            color: #f0f0f0;
            font-size: 16px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .tool-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            color: #f0f0f0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OlaWebTools</h1>
        <p>生活充满了选择，而生活的态度就是一切！</p>
    </div>

    <div class="tool-grid">
        <div class="tool-card">
            <h3>用户加钱</h3>
            <a href="/add" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>身份认证</h3>
            <a href="/idChange" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>房间加人</h3>
            <a href="/insertPerson" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>用户加物品</h3>
            <a href="/addCommodity" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>创建商业房</h3>
            <a href="/createRoom" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>模拟充值</h3>
            <a href="/pay" class="btn">打开</a>
        </div>
        <div class="tool-card">
            <h3>SQL注入Demo</h3>
            <a href="/sqlDemo" class="btn">打开</a>
        </div>
    </div>

    <div class="footer">
        <p>广告位招租！！！</p>
    </div>
</body>
</html>
